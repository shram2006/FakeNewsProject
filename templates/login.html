<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #330066 25%, #4d0099 50%, #330066 75%, #1a0033 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
            box-shadow: 0 0 3px rgba(200, 150, 255, 0.8);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid rgba(200, 150, 255, 0.3);
            padding: 50px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.5),
                        inset 0 0 30px rgba(200, 150, 255, 0.1);
            animation: slideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .glass-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(200, 150, 255, 0.2) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: #e6ccff;
            font-size: 38px;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(200, 150, 255, 0.6),
                         0 4px 10px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
            font-weight: 800;
        }

        .header p {
            color: rgba(230, 204, 255, 0.85);
            font-size: 14px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            color: rgba(230, 204, 255, 0.95);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid rgba(200, 150, 255, 0.4);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            transition: all 0.35s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(230, 204, 255, 0.5);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(200, 150, 255, 0.7);
            box-shadow: 0 0 20px rgba(200, 150, 255, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9d4edd 0%, #7209b7 50%, #5a189a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.5),
                        inset 0 -2px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.7),
                        inset 0 -2px 10px rgba(0, 0, 0, 0.2);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .error-message {
            background: rgba(255, 67, 67, 0.25);
            border: 1.5px solid rgba(255, 150, 150, 0.6);
            color: #ffb3b3;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 25px;
            display: none;
            animation: slideIn 0.4s ease;
            position: relative;
            z-index: 1;
            font-weight: 600;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .demo-credentials {
            background: rgba(200, 150, 255, 0.12);
            border-left: 4px solid rgba(200, 150, 255, 0.6);
            border-radius: 10px;
            padding: 15px 18px;
            margin-top: 18px;
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .demo-credentials p {
            margin: 6px 0;
            color: rgba(230, 204, 255, 0.9);
            line-height: 1.6;
        }

        .demo-credentials strong {
            color: #e6ccff;
            font-weight: 700;
        }

        .info-text {
            text-align: center;
            color: rgba(230, 204, 255, 0.8);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="stars" id="starsContainer"></div>

    <div class="login-container">
        <div class="glass-box">
            <div class="header">
                <h1>🔐 FAKE NEWS DETECTOR</h1>
                <p>Secure Access to Advanced News Intelligence</p>
            </div>

            {% if error %}
            <div class="error-message show">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">👤 Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">🔑 Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="off">
                </div>

                <button type="submit" class="login-btn">🚀 Login Now</button>

                <div class="demo-credentials">
                    <p><strong>📋 Demo Credentials:</strong></p>
                    <p>👤 Username: <strong>demo</strong></p>
                    <p>🔑 Password: <strong>demo123</strong></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Generate random stars with enhanced effect
        function generateStars() {
            const starsContainer = document.getElementById('starsContainer');
            const starCount = 120;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                starsContainer.appendChild(star);
            }
        }

        generateStars();

        // Focus animation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
