<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        header {
            background: #1e90ff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }
        .article {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 15px 20px;
            margin-bottom: 15px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .description {
            margin: 10px 0;
            color: #555;
        }
        .prediction {
            font-weight: bold;
        }
        .FAKE {
            color: red;
        }
        .REAL {
            color: green;
        }
        .confidence {
            font-size: 14px;
            color: #333;
        }
        a {
            text-decoration: none;
            color: #1e90ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Fake News Detector (Live NewsAPI)</h1>
    </header>
    <div class="container">
        {% for article in articles %}
        <div class="article">
            <div class="title"><a href="{{ article.url }}" target="_blank">{{ article.title }}</a></div>
            {% if article.description %}
            <div class="description">{{ article.description }}</div>
            {% endif %}
            <div class="prediction {{ article.prediction }}">{{ article.prediction }}</div>
            <div class="confidence">Confidence: {{ article.confidence }}%</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
